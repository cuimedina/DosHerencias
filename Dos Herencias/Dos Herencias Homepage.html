<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dos Herencias — Homepage Options</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" />
<style>
  html, body { margin:0; padding:0; background:#e8e4dc; }
  * { box-sizing: border-box; }
  body { font-family: "Inter Tight", system-ui, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="site-dark.jsx"></script>
<script type="text/babel" src="site-light.jsx"></script>

<script type="text/babel">
function App() {
  // Full-width site previews rendered inside artboards
  const W = 1440;
  const H = 4800; // approx full page height — tall to show full site
  return (
    <DesignCanvas>
      <DCSection id="homepage" title="Dos Herencias · Homepage" subtitle="Two directions for the launch site. Click ⤢ on any board to open fullscreen.">
        <DCArtboard id="dark" label="Option A · Noir — dark, moody, foil-on-black" width={W} height={H}>
          <DarkSite />
        </DCArtboard>
        <DCArtboard id="light" label="Option B · Ivory — airy, modern editorial" width={W} height={H}>
          <LightSite />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
